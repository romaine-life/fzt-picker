name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ── Rust (COM hook + injector + test-trigger) ──────────────
      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows/target
          key: rust-${{ hashFiles('windows/Cargo.lock') }}
          restore-keys: rust-
      - name: Build Rust binaries
        shell: bash
        working-directory: windows
        run: cargo build --release

      # ── Go (CGo DLL + standalone frontend) ─────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: frontend/go.mod
          cache-dependency-path: |
            frontend/go.sum
            frontend/cgo/go.sum

      - name: Resolve local replace directives (frontend)
        shell: bash
        working-directory: frontend
        run: |
          go mod edit -dropreplace github.com/nelsong6/fzt
          go mod edit -dropreplace github.com/nelsong6/fzt-terminal
          go mod edit -droprequire github.com/nelsong6/fzt-terminal
          go get github.com/nelsong6/fzt@latest
          go get github.com/nelsong6/fzt-terminal@latest
          go mod tidy

      - name: Resolve local replace directives (cgo)
        shell: bash
        working-directory: frontend/cgo
        run: |
          go mod edit -dropreplace github.com/nelsong6/fzt
          go mod edit -dropreplace github.com/nelsong6/fzt-terminal
          go mod edit -dropreplace github.com/nelsong6/fzt-picker/frontend
          go mod edit -droprequire github.com/nelsong6/fzt-terminal
          go mod edit -replace github.com/nelsong6/fzt-picker/frontend=../
          go get github.com/nelsong6/fzt@latest
          go get github.com/nelsong6/fzt-terminal@latest
          go mod tidy

      - name: Build CGo DLL
        shell: bash
        working-directory: frontend/cgo
        env:
          CGO_ENABLED: "1"
          CC: C:\msys64\ucrt64\bin\gcc.exe
        run: go build -buildmode=c-shared -o ../picker_frontend.dll .

      - name: Build standalone frontend
        shell: bash
        working-directory: frontend
        env:
          CGO_ENABLED: "0"
        run: go build -o picker-frontend.exe .

      # ── Release ────────────────────────────────────────────────
      - name: Prepare release assets
        shell: bash
        run: |
          mkdir release
          cp windows/target/release/picker_hook.dll release/
          cp windows/target/release/picker-injector.exe release/picker.exe
          cp windows/target/release/picker-test-trigger.exe release/test-trigger.exe
          cp frontend/picker_frontend.dll release/
          cp frontend/picker-frontend.exe release/

      - name: Create versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            next="v0.1.$((patch + 1))"
          fi
          gh release create "$next" release/* \
            -R ${{ github.repository }} \
            --title "$next" \
            --notes "$(git log --oneline -1)"
