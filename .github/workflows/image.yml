name: Build Image

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        shell: bash
        run: |
          image="ghcr.io/${{ github.repository }}:latest"
          docker build -t "$image" .
          docker push "$image"
