name: Release

# Fires on direct pushes to main. Leaf with binary artifacts (Rust + Go
# frontend module) — no downstream dispatch, build.yml fires with the new
# tag to build+upload the Windows picker binary.
#
# Note: the Go module lives in ./frontend (not repo root), but the release
# template operates at repo level (git HEAD for tag target), so no
# go-mod-path input is needed here.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/go.mod'
      - 'frontend/go.sum'

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: nelsong6/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
    with:
      artifact-build-workflow: build.yml
