name: Dependency Update

on:
  repository_dispatch:
    types: [fzt-updated]

# The called reusable workflow declares contents:write + actions:write. When
# the caller leaves permissions implicit, the token falls back to the repo's
# default_workflow_permissions ('read') and the workflow fails at startup
# before any job runs (blank log, 1-second duration). Declare the permissions
# here to grant the token what the template needs.
permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  group: dependency-update
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      go-mod-path: frontend
      modules: github.com/nelsong6/fzt github.com/nelsong6/fzt-terminal
      # Leaf with binary artifacts (Rust + Go): atomic release, no downstream
      # dispatch, then fire build.yml with the new tag to build + upload.
      artifact-build-workflow: build.yml
