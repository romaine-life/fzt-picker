name: Build

# Called by the dep-update template AFTER it cuts a release. Builds the
# Rust COM hook + injector + Go CGo DLL + standalone frontend for the
# given tag and uploads all assets to the existing release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build artifacts for (and upload to)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # ── Rust (COM hook + injector + test-trigger) ──────────────
      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows/target
          key: rust-${{ hashFiles('windows/Cargo.lock') }}
          restore-keys: rust-
      - name: Build Rust binaries
        shell: bash
        working-directory: windows
        run: cargo build --release

      # ── Go (CGo DLL + standalone frontend) ─────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: frontend/go.mod
          cache-dependency-path: frontend/go.sum

      - uses: actions/cache@v4
        id: msys2-cache
        with:
          path: C:\msys64\ucrt64
          key: msys2-ucrt64-gcc
      - name: Install MinGW GCC
        if: steps.msys2-cache.outputs.cache-hit != 'true'
        shell: bash
        run: C:/msys64/usr/bin/pacman.exe -S --noconfirm mingw-w64-ucrt-x86_64-gcc

      - name: Build CGo DLL
        shell: bash
        working-directory: frontend
        env:
          CGO_ENABLED: "1"
          CC: C:\msys64\ucrt64\bin\gcc.exe
        run: go build -buildmode=c-shared -o picker_frontend.dll ./cgo

      - name: Build standalone frontend
        shell: bash
        working-directory: frontend
        env:
          CGO_ENABLED: "0"
        run: go build -o picker-frontend.exe .

      # ── Upload to existing release ─────────────────────────────
      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} \
            windows/target/release/picker_hook.dll \
            windows/target/release/picker.exe \
            windows/target/release/test-trigger.exe \
            frontend/picker_frontend.dll \
            frontend/picker-frontend.exe \
            --clobber \
            -R ${{ github.repository }}
