name: Build

on:
  push:
    branches: [main]
    paths-ignore: [Dockerfile]

permissions:
  contents: write
  packages: read

env:
  IMAGE: ghcr.io/nelsong6/fzt-picker:latest

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull builder image
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "$IMAGE"

      - name: Build
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:C:/src" \
            -w C:/src \
            "$IMAGE" \
            cmd /C " ^
              cd windows && cargo build --release && cd .. ^
              && cd frontend ^
              && go mod edit -dropreplace github.com/nelsong6/fzt ^
              && go mod edit -dropreplace github.com/nelsong6/fzt-terminal ^
              && go mod edit -droprequire github.com/nelsong6/fzt-terminal ^
              && go get github.com/nelsong6/fzt@latest ^
              && go get github.com/nelsong6/fzt-terminal@latest ^
              && go mod tidy ^
              && cd cgo ^
              && go mod edit -dropreplace github.com/nelsong6/fzt ^
              && go mod edit -dropreplace github.com/nelsong6/fzt-terminal ^
              && go mod edit -dropreplace github.com/nelsong6/fzt-picker/frontend ^
              && go mod edit -droprequire github.com/nelsong6/fzt-terminal ^
              && go mod edit -replace github.com/nelsong6/fzt-picker/frontend=../ ^
              && go get github.com/nelsong6/fzt@latest ^
              && go get github.com/nelsong6/fzt-terminal@latest ^
              && go mod tidy ^
              && set CGO_ENABLED=1 ^
              && go build -buildmode=c-shared -o ../picker_frontend.dll . ^
              && cd .. ^
              && set CGO_ENABLED=0 ^
              && go build -o picker-frontend.exe . ^
              && cd .. ^
              && mkdir release ^
              && copy windows\\target\\release\\picker_hook.dll release\\ ^
              && copy windows\\target\\release\\picker.exe release\\ ^
              && copy windows\\target\\release\\test-trigger.exe release\\ ^
              && copy frontend\\picker_frontend.dll release\\ ^
              && copy frontend\\picker-frontend.exe release\\ ^
            "

      # ── Release ────────────────────────────────────────────────
      - name: Copy release assets from container
        shell: bash
        run: |
          # Container wrote to the bind mount; verify files exist
          ls -la release/

      - name: Create versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            next="v0.1.$((patch + 1))"
          fi
          gh release create "$next" release/* \
            -R ${{ github.repository }} \
            --title "$next" \
            --notes "$(git log --oneline -1)"
