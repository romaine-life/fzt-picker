name: Release

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run release.yml -R romaine-life/fzt-picker`.

on:
  workflow_dispatch:

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: romaine-life/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
    with:
      artifact-build-workflow: build.yml
